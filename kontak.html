<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontak | Faisal Al Aziz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#F8F5ED;
overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:85px;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,.05);
z-index:1000;
}

.navbar{
max-width:1400px;
height:100%;
margin:auto;
padding:0 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-circle{
width:52px;
height:52px;
border-radius:50%;
background:linear-gradient(135deg,#f9e38c,#d79b16,#fff4c0);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:800;
color:white;
}

.logo-text{
font-size:26px;
font-weight:700;
color:#D89E1D;
}

/* ================= MENU ================= */

.menu-dropdown{position:relative;}

.menu-btn{
width:50px;
height:50px;
background:transparent;
border:none;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:6px;
}

.menu-btn span{
width:30px;
height:3px;
background:#D89E1D;
border-radius:10px;
transition:.35s;
}

.menu-btn.active span:nth-child(1){
transform:translateY(9px) rotate(45deg);
}

.menu-btn.active span:nth-child(2){opacity:0;}

.menu-btn.active span:nth-child(3){
transform:translateY(-9px) rotate(-45deg);
}

.dropdown-content{
position:absolute;
right:0;
top:65px;
min-width:250px;
background:white;
border-radius:18px;
display:none;
box-shadow:0 20px 40px rgba(216,158,29,.12);
overflow:hidden;
}

.dropdown-content.show{display:block;}

.dropdown-content a{
display:block;
padding:16px 22px;
text-decoration:none;
color:#444;
transition:.3s;
}

.dropdown-content a:hover{
background:#FFF8E8;
color:#D89E1D;
}

/* ================= PAGE ================= */

.page{
max-width:1200px;
margin:auto;
padding:140px 30px 80px;
}

.title{
text-align:center;
font-size:58px;
font-weight:800;
}

.title span{color:#EFB32E;}

.subtitle{
text-align:center;
color:#666;
margin-top:10px;
font-size:18px;
}

/* ================= CONTACT GRID ================= */

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
margin-top:60px;
}

/* ================= FORM ================= */

.form-box{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-box h2{
margin-bottom:25px;
color:#222;
}

.input-group{
margin-bottom:20px;
position:relative;
}

.input-group input,
.input-group textarea{
width:100%;
padding:15px 15px;
border:2px solid #eee;
border-radius:12px;
outline:none;
font-size:16px;
transition:.3s;
background:transparent;
}

.input-group textarea{
min-height:120px;
resize:none;
}

.input-group label{
position:absolute;
left:15px;
top:15px;
color:#aaa;
transition:.3s;
pointer-events:none;
background:white;
padding:0 5px;
}

/* floating label */
.input-group input:focus,
.input-group textarea:focus{
border-color:#EFB32E;
}

.input-group input:focus + label,
.input-group textarea:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group textarea:not(:placeholder-shown) + label{
top:-10px;
font-size:12px;
color:#EFB32E;
}

/* button */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#EFB32E;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#d89e1d;
transform:translateY(-3px);
}

/* ================= INFO ================= */

.info-box{
display:flex;
flex-direction:column;
gap:20px;
}

.info-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.info-card:hover{
transform:translateY(-5px);
}

.info-card h3{
color:#D89E1D;
margin-bottom:10px;
}

.info-card p{
color:#555;
}

/* social */
.social{
display:flex;
gap:15px;
margin-top:10px;
}

.social a{
width:45px;
height:45px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:#fff;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-decoration:none;
color:#D89E1D;
transition:.3s;
}

.social a:hover{
background:#EFB32E;
color:white;
transform:translateY(-3px);
}

/* ================= FLOAT HOME ================= */

.floating-home{
position:fixed;
right:30px;
bottom:30px;
width:65px;
height:65px;
background:#EFB32E;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
box-shadow:0 10px 25px rgba(239,179,46,.35);
text-decoration:none;
transition:.3s;
z-index:999;
}

.floating-home:hover{
transform:translateY(-5px);
background:#d89e1d;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.title{font-size:38px;}

.contact-grid{
grid-template-columns:1fr;
}

.form-box{
padding:25px;
}
}

</style>
</head>

<body>

<script>

const menuBtn=document.querySelector(".menu-btn");
const dropdown=document.getElementById("dropdownMenu");

menuBtn.addEventListener("click",e=>{
e.stopPropagation();
menuBtn.classList.toggle("active");
dropdown.classList.toggle("show");
});

document.addEventListener("click",()=>{
menuBtn.classList.remove("active");
dropdown.classList.remove("show");
});
